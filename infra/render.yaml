services:
  - type: web
    name: growmodo-web
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./infra/docker/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: growmodo-db
          property: connectionString
      - key: NEXT_PUBLIC_SITE_URL
        value: https://growmodo-web.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: growmodo-db
    databaseName: growmodo
    user: admin
    region: oregon
